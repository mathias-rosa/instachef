services:
  mongo:
    image: mongo:7
    container_name: instachef_mongo
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      - vpn
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-instachef}
    volumes:
      - mongo_prod_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  instachef:
    build:
      context: .
      dockerfile: Dockerfile
    image: instachef:latest
    restart: unless-stopped
    network_mode: "service:vpn" 
    depends_on:
      mongo:
        condition: service_healthy
      vpn:
        condition: service_started
    env_file:
      - .env
    environment:
      INSTACHEF_MODE: ${INSTACHEF_MODE:-telegram}
      RECIPE_REPOSITORY_BACKEND: ${RECIPE_REPOSITORY_BACKEND:-mongodb}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-instachef}
    command: uv run main.py --mode ${INSTACHEF_MODE:-telegram}
    volumes:
      - ./db:/app/db
      - ./downloaded_reels:/app/downloaded_reels
    stdin_open: true
    tty: true

  vpn:
    image: linuxserver/wireguard:latest
    container_name: vpn_gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - WIREGUARD_CONF_64=${WIREGUARD_CONF_64} 
    entrypoint: >
      sh -c "echo \"$$WIREGUARD_CONF_64\" | base64 -d > /config/wg0.conf && exec /init"
    restart: unless-stopped

volumes:
  mongo_prod_data: