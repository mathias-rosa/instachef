services:
  mongo:
    image: mongo:7
    container_name: instachef_mongo
    restart: unless-stopped
    networks:
      - internal
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-instachef}
    volumes:
      - mongo_prod_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  reels-downloader:
    build:
      context: .
      dockerfile: Dockerfile.downloader
    image: instachef:downloader
    container_name: reels_downloader
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_started
    volumes:
      - ./downloaded_reels:/app/downloaded_reels

  instachef:
    build:
      context: .
      dockerfile: Dockerfile
    image: instachef:latest
    container_name: instachef
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      mongo:
        condition: service_healthy
      vpn:
        condition: service_started
    env_file:
      - .env
    environment:
      INSTACHEF_MODES: ${INSTACHEF_MODES:-telegram api}
      RECIPE_REPOSITORY_BACKEND: ${RECIPE_REPOSITORY_BACKEND:-mongodb}
      DOWNLOADER_BACKEND: http
      DOWNLOADER_HTTP_URL: http://vpn:8001
      MONGODB_URI: mongodb://instachef_mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-instachef}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8000}
    command:
      [
        "sh",
        "-c",
        'set --; for mode in $${INSTACHEF_MODES:-telegram api}; do set -- "$$@" --mode "$$mode"; done; exec uv run main.py "$$@"',
      ]
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./db:/app/db
      - ./downloaded_reels:/app/downloaded_reels
    stdin_open: true
    tty: true

  vpn:
    image: linuxserver/wireguard:latest
    container_name: vpn_gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - internal
    ports:
      - "8001:8001"
    environment:
      - WIREGUARD_CONF_64=${WIREGUARD_CONF_64}
    entrypoint: >
      sh -c "echo \"$$WIREGUARD_CONF_64\" | base64 -d > /config/wg0.conf && exec /init"
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  mongo_prod_data:
    driver: local
