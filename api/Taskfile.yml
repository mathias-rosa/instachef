version: "3"

tasks:
  default:
    cmds:
      - task --list

  # Development

  dev:cli:
    desc: Run app in CLI mode (requires dev:up first)
    cmds:
      - uv run main.py --mode cli

  dev:api:
    desc: Run app in API mode (requires dev:up first)
    cmds:
      - uv run main.py --mode api

  dev:telegram:
    desc: Run app in Telegram mode (requires dev:up first)
    cmds:
      - uv run main.py --mode telegram

  dev:api-cli:
    desc: Run app in both API and CLI modes (requires dev:up first)
    cmds:
      - uv run main.py --mode api --mode cli

  # Dependencies
  sync:
    desc: Install dependencies with uv
    cmds:
      - uv sync

  # Code Quality
  lint:
    desc: Check code style with ruff
    cmds:
      - uv run ruff check .

  format:
    desc: Format code with ruff
    cmds:
      - uv run ruff format .

  check:
    desc: Run lint and format checks
    cmds:
      - task: lint
      - uv run ruff format --check .

  # Database
  db:mongosh:
    desc: Open MongoDB shell
    cmds:
      - docker compose -f docker-compose.dev.yml exec mongo mongosh cookachu

  db:reset:
    desc: Remove MongoDB volumes (WARNING - deletes data)
    cmds:
      - docker compose -f docker-compose.dev.yml down -v
