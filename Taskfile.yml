version: "3"

tasks:
  default:
    cmds:
      - task --list

  # Development
  dev:up:
    desc: Start MongoDB for development
    cmds:
      - docker compose -f docker-compose.dev.yml up -d

  dev:down:
    desc: Stop MongoDB development services
    cmds:
      - docker compose -f docker-compose.dev.yml down

  dev:logs:
    desc: View MongoDB logs
    cmds:
      - docker compose -f docker-compose.dev.yml logs -f mongo

  dev:cli:
    desc: Run app in CLI mode (requires dev:up first)
    cmds:
      - export $(cat .env.dev 2>/dev/null | grep -v '^#' | xargs) || true && uv run main.py --mode cli

  # Dependencies
  sync:
    desc: Install dependencies with uv
    cmds:
      - uv sync

  # Code Quality
  lint:
    desc: Check code style with ruff
    cmds:
      - uv run ruff check .

  format:
    desc: Format code with ruff
    cmds:
      - uv run ruff format .

  check:
    desc: Run lint and format checks
    cmds:
      - task lint
      - uv run ruff format --check .

  # Database
  db:mongosh:
    desc: Open MongoDB shell
    cmds:
      - docker compose -f docker-compose.dev.yml exec mongo mongosh instachef

  db:reset:
    desc: Remove MongoDB volumes (WARNING - deletes data)
    cmds:
      - docker compose -f docker-compose.dev.yml down -v
